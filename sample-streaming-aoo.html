<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Streaming App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

  <!-- Top Navigation -->
  <header class="flex items-center justify-between px-6 py-4 border-b border-gray-800 fixed w-full z-50 bg-black/60 backdrop-blur">
    <div class="text-2xl font-bold tracking-widest">FLIX</div>

    <nav class="hidden md:flex gap-6 text-sm text-gray-300">
      <a href="#" class="hover:text-white">Home</a>
      <a href="#" class="hover:text-white">TV Shows</a>
      <a href="#" class="hover:text-white">Movies</a>
      <a href="#" class="hover:text-white">New & Popular</a>
      <a href="#" class="hover:text-white">My List</a>
    </nav>

    <div class="flex gap-3 items-center">
      <input class="hidden md:block bg-gray-900 px-3 py-1 rounded text-sm outline-none" placeholder="Search" />
      <div class="w-8 h-8 rounded-full bg-gray-700"></div>
    </div>
  </header>

  <!-- HERO CAROUSEL -->
  <section id="hero" class="relative h-[75vh] overflow-hidden">

    <video id="heroVideo" class="absolute top-0 left-0 w-full h-full object-cover transition-opacity duration-700" autoplay muted playsinline></video>
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- Progress Bar -->
    <div class="absolute top-0 left-0 w-full h-1 bg-gray-800">
      <div id="progressBar" class="h-full bg-white w-0 transition-all duration-100"></div>
    </div>

    <!-- Content -->
    <div id="heroContent" class="relative z-10 flex items-end h-full p-10 transition-opacity duration-500">
      <div class="max-w-xl">
        <h1 id="heroTitle" class="text-5xl font-bold mb-4"></h1>
        <p id="heroDesc" class="text-gray-300 mb-4"></p>
        <div class="flex gap-3">
          <button class="bg-white text-black px-5 py-2 rounded font-semibold">▶ Play</button>
          <button class="bg-gray-700 px-5 py-2 rounded">More Info</button>
        </div>
      </div>
    </div>

    <!-- Manual Controls -->
    <button onclick="prevHero()" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/60 px-3 py-2 z-20">‹</button>
    <button onclick="nextHero()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/60 px-3 py-2 z-20">›</button>

  </section>

  <!-- Content -->
  <main class="p-6 space-y-12 mt-6"></main>

  <!-- Hover Sound -->
  <audio id="hoverSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

  <script>
    const container = document.querySelector('main');
    const hoverSound = document.getElementById('hoverSound');

    const featured = [
      { title: "Shadow City", desc: "A detective uncovers hidden truths in a dystopian cyberpunk city.", video: "https://www.w3schools.com/html/mov_bbb.mp4" },
      { title: "Ocean Drift", desc: "A survival journey across endless seas and storms.", video: "https://www.w3schools.com/html/movie.mp4" },
      { title: "Neon Nights", desc: "Cyberpunk rebels fight for freedom in neon-lit streets.", video: "https://www.w3schools.com/html/mov_bbb.mp4" }
    ];

    let heroIndex = 0;
    let heroInterval;
    let progressInterval;
    let progress = 0;

    function loadHero(index) {
      const item = featured[index];

      const video = document.getElementById('heroVideo');
      const title = document.getElementById('heroTitle');
      const desc = document.getElementById('heroDesc');

      video.style.opacity = 0;
      document.getElementById('heroContent').style.opacity = 0;

      setTimeout(() => {
        video.src = item.video;
        video.load();
        video.play();

        title.textContent = item.title;
        desc.textContent = item.desc;

        video.style.opacity = 1;
        document.getElementById('heroContent').style.opacity = 1;
      }, 400);

      resetProgress();
    }

    function nextHero() {
      heroIndex = (heroIndex + 1) % featured.length;
      loadHero(heroIndex);
      resetAuto();
    }

    function prevHero() {
      heroIndex = (heroIndex - 1 + featured.length) % featured.length;
      loadHero(heroIndex);
      resetAuto();
    }

    function startAuto() {
      heroInterval = setInterval(nextHero, 5000);
      startProgress();
    }

    function resetAuto() {
      clearInterval(heroInterval);
      clearInterval(progressInterval);
      startAuto();
    }

    function startProgress() {
      progress = 0;
      const bar = document.getElementById('progressBar');

      progressInterval = setInterval(() => {
        progress += 2;
        bar.style.width = progress + "%";
        if (progress >= 100) {
          clearInterval(progressInterval);
        }
      }, 100);
    }

    function resetProgress() {
      const bar = document.getElementById('progressBar');
      bar.style.width = "0%";
    }

    // Swipe support
    let startX = 0;

    document.getElementById('hero').addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
    });

    document.getElementById('hero').addEventListener('touchend', e => {
      let endX = e.changedTouches[0].clientX;
      if (startX - endX > 50) nextHero();
      if (endX - startX > 50) prevHero();
    });

    // init hero
    loadHero(heroIndex);
    startAuto();

    // ROW DATA
    const sampleData = [
      { title: "Shadow City", desc: "A detective uncovers hidden truths in a dystopian city.", img: "https://picsum.photos/300/200?1", video: "https://www.w3schools.com/html/mov_bbb.mp4" },
      { title: "Ocean Drift", desc: "Survival across endless seas and storms.", img: "https://picsum.photos/300/200?2", video: "https://www.w3schools.com/html/movie.mp4" },
      { title: "Neon Nights", desc: "Cyberpunk rebels fight in neon-lit streets.", img: "https://picsum.photos/300/200?3", video: "https://www.w3schools.com/html/mov_bbb.mp4" },
      { title: "Lost Realm", desc: "A fantasy adventure through forgotten kingdoms.", img: "https://picsum.photos/300/200?4", video: "https://www.w3schools.com/html/movie.mp4" },
      { title: "Code Breaker", desc: "A hacker uncovers a global conspiracy.", img: "https://picsum.photos/300/200?5", video: "https://www.w3schools.com/html/mov_bbb.mp4" }
    ];

    // SMART ALGORITHM (simple demo)
    const recommended = sampleData.filter(x => x.title.includes("Shadow"));

    function renderRow(title, data, id) {
      const section = document.createElement('section');

      section.innerHTML = `
        <h2 class="text-xl font-semibold mb-3">${title}</h2>
        <div class="relative">
          <button onclick="scrollRow('${id}', -300)" class="absolute left-0 top-1/2 -translate-y-1/2 bg-black/70 px-3 py-2 z-20">‹</button>
          <button onclick="scrollRow('${id}', 300)" class="absolute right-0 top-1/2 -translate-y-1/2 bg-black/70 px-3 py-2 z-20">›</button>

          <div id="${id}" class="flex gap-4 overflow-x-auto scroll-smooth px-10 pb-4">
            ${data.map(item => `
              <div class="relative min-w-[200px] h-[120px] rounded-lg overflow-hidden group transform transition duration-300 hover:scale-110 hover:z-30">
                <img src="${item.img}" class="w-full h-full object-cover group-hover:opacity-0 transition" />
                <video class="absolute top-0 left-0 w-full h-full object-cover opacity-0 group-hover:opacity-100 transition" muted loop playsinline>
                  <source src="${item.video}" type="video/mp4" />
                </video>
                <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black via-black/80 to-transparent p-2 opacity-0 group-hover:opacity-100 transition">
                  <h3 class="text-sm font-bold">${item.title}</h3>
                  <p class="text-xs text-gray-300 line-clamp-2">${item.desc}</p>
                  <div class="flex gap-2 mt-2">
                    <button class="bg-white text-black text-xs px-2 py-1 rounded">▶ Play</button>
                    <button class="bg-gray-700 text-xs px-2 py-1 rounded">＋ My List</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      container.appendChild(section);
    }

    renderRow("Trending Now", sampleData, "row-1");
    renderRow("Because You Watched Shadow City", recommended, "row-2");
    renderRow("Popular", sampleData, "row-3");
    renderRow("New Releases", sampleData, "row-4");

    function scrollRow(id, amount) {
      document.getElementById(id).scrollBy({ left: amount, behavior: 'smooth' });
    }
  </script>

</body>
</html>
